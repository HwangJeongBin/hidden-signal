<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채용 공고 히든 시그널 분석기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:760px;margin:0 auto}
.header{margin-bottom:2rem}
.header h1{font-size:22px;font-weight:600;margin-bottom:6px}
.header-sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:4px}
.header-credit{font-size:12px;color:#aaa;margin-top:4px}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.tabs{display:flex;border:0.5px solid #e0e0d8;border-radius:8px;overflow:hidden;margin-bottom:1rem}
.tab{flex:1;padding:9px 0;font-size:13px;background:transparent;border:none;cursor:pointer;color:#666;font-family:inherit}
.tab.active{background:#f0f0ec;color:#1a1a1a;font-weight:500}
.tab:hover:not(.active){background:#f5f5f2}
input[type=text],input[type=number],select,textarea{width:100%;padding:8px 12px;border:0.5px solid #d0d0c8;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:#888}
textarea{resize:vertical}
button{padding:8px 18px;border:0.5px solid #d0d0c8;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.15s}
button:hover{background:#f0f0ec}
button.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
button.primary:hover{background:#333}
button:disabled{opacity:0.5;cursor:not-allowed}
.search-row{display:flex;gap:8px;margin-bottom:1rem}
.search-row input{flex:1}
.company-list{list-style:none;border:0.5px solid #d0d0c8;border-radius:8px;overflow:hidden;margin-bottom:1rem;max-height:200px;overflow-y:auto;background:#fff}
.company-list li{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:0.5px solid #e8e8e0}
.company-list li:last-child{border-bottom:none}
.company-list li:hover{background:#f5f5f2}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.meta-card{background:#f5f5f2;border-radius:8px;padding:10px 12px}
.meta-card .label{font-size:11px;color:#888;margin-bottom:2px}
.meta-card .value{font-size:17px;font-weight:500}
.risk-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:1.5rem}
.section-title{font-size:14px;font-weight:500;margin-bottom:10px}
.signal-row{margin-bottom:10px}
.signal-label{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:3px}
.bar-bg{height:8px;background:#e8e8e0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.highlight-list{list-style:none;margin-bottom:1.5rem}
.highlight-list li{font-size:12px;color:#555;padding:8px 10px;border-left:2px solid #ccc;margin-bottom:6px;line-height:1.6;background:#f8f8f6;border-radius:0 8px 8px 0}
.chip{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid #d0d0c8;color:#666;display:inline-block;margin:2px}
.chip.warning{background:#FFF3CD;color:#856404;border-color:#F5C842}
.chip.danger{background:#FFEBEE;color:#c62828;border-color:#ef9a9a}
.separator{border-top:0.5px solid #e0e0d8;margin:1.5rem 0;padding-top:1.5rem}
.msg{font-size:12px;margin-top:6px}
.msg.success{color:#2e7d32}
.msg.error{color:#c62828}
.no-result{padding:2.5rem 0;text-align:center;color:#888;font-size:13px}
.size-compare-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.size-bar-bg{flex:1;height:6px;background:#e8e8e0;border-radius:3px;overflow:hidden}
.size-bar-fill{height:100%;border-radius:3px;background:#bbb}
.hint{font-size:11px;color:#999;margin-top:4px}
mark{background:#FFF3CD;color:#856404;border-radius:2px;padding:0 2px}
.db-status{font-size:11px;color:#aaa;margin-top:4px}
.db-status.ok{color:#2e7d32}
.db-status.err{color:#c62828}
.job-input-section{background:#f8f8f6;border:0.5px solid #e0e0d8;border-radius:8px;padding:14px;margin-bottom:1.5rem}
.job-input-section .section-title{margin-bottom:6px}
.job-input-section .hint{margin-bottom:8px}
.sim-result{margin-top:12px}
.sim-header{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.sim-score{font-size:22px;font-weight:600}
.keyword-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
</style>
</head>

<div class="container">
  <div class="header">
    <h1>채용 공고 히든 시그널 분석기</h1>
    <p class="header-sub">잡플래닛 리뷰에 숨겨진 부정 신호를 탐지하고, 채용 공고와 실제 업무 간 괴리를 정량적으로 분석합니다.</p>
    <p class="header-credit">경희대학교 소프트웨어융합학과 황정빈 · 응용데이터분석 텀프로젝트 1 연구 결과를 토대로 제작</p>
    <div id="db-status" class="db-status">Firebase 연결 중...</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('db')" id="tab-db">DB 회사 검색</button>
      <button class="tab" onclick="switchTab('manual')" id="tab-manual">리뷰 직접 입력</button>
    </div>

    <div id="pane-db">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="회사명 검색 (예: 더스윙, 핀다, 당근서비스...)" oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')selectFirst()">
        <button class="primary" onclick="selectFirst()">분석 →</button>
      </div>
      <ul class="company-list" id="company-list" style="display:none"></ul>
      <div style="font-size:12px;color:#999">기본 DB: 49개 회사 · 점핏 공고 87건 · 잡플래닛 리뷰 2,361건 기반</div>
    </div>

    <div id="pane-manual" style="display:none">
      <input type="text" id="manual-name" placeholder="회사명" style="margin-bottom:8px">
      <textarea id="manual-review" placeholder="잡플래닛 리뷰 텍스트를 붙여넣으세요 (장점·단점·경영진에게 바라는 점 포함)" style="height:110px;margin-bottom:8px"></textarea>
      <textarea id="manual-job" placeholder="(선택사항) 점핏·사람인 등의 채용 공고 담당업무를 붙여넣으면 공고 신뢰도를 추가 분석합니다" style="height:80px;margin-bottom:8px"></textarea>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="number" id="manual-rating" placeholder="종합 평점 (예: 3.2)" step="0.1" min="1" max="5" style="width:180px">
        <select id="manual-size">
          <option value="">회사 규모 선택</option>
          <option value="대기업/중견">대기업/중견 (200명+)</option>
          <option value="중소기업">중소기업 (50~199명)</option>
          <option value="스타트업">스타트업 (50명 미만)</option>
        </select>
      </div>
      <button class="primary" onclick="analyzeManual()" style="width:100%">분석 및 DB 저장 →</button>
      <div class="hint" style="margin-top:6px">* 분석 결과는 Firebase DB에 저장되어 모든 사용자와 공유됩니다.</div>
    </div>
  </div>

  <div id="result-area" style="display:none"></div>
</div>

async function loadFromFirebase(){
  const statusEl=document.getElementById('db-status');
  try{
    const snap=await getDocs(collection(firestore,COLL));
    snap.forEach(d=>{
      const data=d.data();
      if(data.hidden_signal) db[d.id]=data;
    });
    fsReady=true;
    statusEl.className='db-status ok';
    statusEl.textContent=`Firebase 연결됨 · 사용자 추가 데이터 ${snap.size}건 로드`;
  }catch(e){
    statusEl.className='db-status err';
    statusEl.textContent='Firebase 연결 실패 — 기본 DB(49개)로 동작합니다';
  }
}

async function saveToFirebase(name,data){
  if(!fsReady) return;
  try{ await setDoc(doc(firestore,COLL,name),data,{merge:true}); }catch(e){}
}

function switchTab(t){
  document.getElementById('pane-db').style.display=t==='db'?'block':'none';
  document.getElementById('pane-manual').style.display=t==='manual'?'block':'none';
  document.getElementById('tab-db').classList.toggle('active',t==='db');
  document.getElementById('tab-manual').classList.toggle('active',t==='manual');
  document.getElementById('result-area').style.display='none';
}
window.switchTab=switchTab;

function onSearch(val){
  const list=document.getElementById('company-list');
  if(!val.trim()){list.style.display='none';return;}
  const matched=Object.keys(db).filter(n=>n.includes(val.trim()));
  if(!matched.length){list.style.display='none';return;}
  list.innerHTML=matched.slice(0,8).map(n=>`<li onclick="selectCompany('${n}')">${n}</li>`).join('');
  list.style.display='block';
}
window.onSearch=onSearch;

function selectFirst(){
  const val=document.getElementById('search-input').value.trim();
  if(!val) return;
  const matched=Object.keys(db).filter(n=>n.includes(val));
  if(matched.length) selectCompany(matched[0]);
  else showNoResult(val);
}
window.selectFirst=selectFirst;

function selectCompany(name){
  document.getElementById('search-input').value=name;
  document.getElementById('company-list').style.display='none';
  const data=db[name];
  if(!data){showNoResult(name);return;}
  renderResult(data,null);
}
window.selectCompany=selectCompany;

function showNoResult(name){
  const ra=document.getElementById('result-area');
  ra.style.display='block';
  ra.innerHTML=`<div class="card no-result">DB에 등록되지 않은 회사입니다 — <strong>${name}</strong><br><span style="font-size:12px;margin-top:6px;display:block;color:#aaa">리뷰 직접 입력 탭에서 분석하고 Firebase DB에 추가할 수 있습니다.</span></div>`;
}

async function analyzeManual(){
  const name=document.getElementById('manual-name').value.trim();
  const review=document.getElementById('manual-review').value.trim();
  const jobText=document.getElementById('manual-job').value.trim();
  const rating=parseFloat(document.getElementById('manual-rating').value)||null;
  const size=document.getElementById('manual-size').value||null;
  if(!name||!review){alert('회사명과 리뷰 텍스트를 입력해주세요.');return;}
  const btn=document.querySelector('#pane-manual button.primary');
  btn.disabled=true; btn.textContent='저장 중...';
  const hs=calcHiddenSignal(review);
  const existing=db[name];
  let toSave;
  if(existing){
    const merged=(existing._raw_review||'')+' '+review;
    existing.hidden_signal=calcHiddenSignal(merged);
    existing._raw_review=merged;
    if(rating&&!existing.overall_rating) existing.overall_rating=rating;
    if(size&&!existing.size_category) existing.size_category=size;
    toSave=existing;
  } else {
    toSave={company_name:name,size_category:size,overall_rating:rating,employee_count:null,industry:null,hidden_signal:hs,duty_similarity:null,_raw_review:review};
    db[name]=toSave;
  }
  await saveToFirebase(name,toSave);
  btn.disabled=false; btn.textContent='분석 및 DB 저장 →';
  const jobSim=jobText?calcJobSimilarity(jobText,review):null;
  renderResult(db[name],jobSim);
}
window.analyzeManual=analyzeManual;

function analyzeJobInput(name){
  const jobText=document.getElementById('job-input-'+name).value.trim();
  if(!jobText){alert('공고 담당업무 텍스트를 입력해주세요.');return;}
  const data=db[name];
  if(!data) return;
  const rawReview=data._raw_review||'';
  const sim=calcJobSimilarity(jobText,rawReview||buildReviewText(data));
  renderResult(data,sim);
}
window.analyzeJobInput=analyzeJobInput;

function buildReviewText(data){
  return data.hidden_signal&&data.hidden_signal.highlight?data.hidden_signal.highlight.join(' '):'';
}

// TF-IDF 기반 코사인 유사도 계산
function calcJobSimilarity(jobText, reviewText){
  if(!jobText||!reviewText) return null;

  // 업무 관련 문장만 추출
  const reviewSents=reviewText.split(/[.!?\n]/).filter(s=>
    s.length>10 && WORK_KEYWORDS.some(k=>s.includes(k))
  ).join(' ');

  const workTarget=reviewSents||reviewText;

  // 토큰화 (단순 공백 분리 + 2자 이상)
  const tokenize=t=>t.split(/\s+/).filter(w=>w.length>=2);
  const jobTokens=tokenize(jobText);
  const revTokens=tokenize(workTarget);

  if(!jobTokens.length||!revTokens.length) return{similarity:0,only_in_job:[],only_in_review:[]};

  // TF 계산
  const tf=tokens=>{
    const m={};
    tokens.forEach(t=>{m[t]=(m[t]||0)+1;});
    Object.keys(m).forEach(k=>m[k]/=tokens.length);
    return m;
  };

  // 합집합 어휘
  const allWords=[...new Set([...jobTokens,...revTokens])];

  // TF-IDF 벡터 (두 문서 IDF)
  const jobTF=tf(jobTokens);
  const revTF=tf(revTokens);
  const idf=w=>{
    const inJob=jobTF[w]?1:0;
    const inRev=revTF[w]?1:0;
    return Math.log(2/(inJob+inRev+0.001)+1);
  };

  const jobVec=allWords.map(w=>(jobTF[w]||0)*idf(w));
  const revVec=allWords.map(w=>(revTF[w]||0)*idf(w));

  const dot=jobVec.reduce((s,v,i)=>s+v*revVec[i],0);
  const magA=Math.sqrt(jobVec.reduce((s,v)=>s+v*v,0));
  const magB=Math.sqrt(revVec.reduce((s,v)=>s+v*v,0));
  const similarity=magA&&magB?dot/(magA*magB):0;

  // 공고에만 있는 키워드 (과장 가능성)
  const jobSet=new Set(jobTokens.filter(w=>w.length>=2));
  const revSet=new Set(revTokens.filter(w=>w.length>=2));
  const only_in_job=[...jobSet].filter(w=>!revSet.has(w)&&w.length>=2).slice(0,8);
  // 리뷰에만 있는 히든 시그널 (공고가 숨긴 신호)
  const only_in_review=ALL_SIGNAL_WORDS.filter(w=>revSet.has(w)&&!jobSet.has(w));

  return{similarity:Math.round(similarity*10000)/10000,only_in_job,only_in_review};
}

function calcHiddenSignal(text){
  const tokens=text.split(/\s+/);
  const total=tokens.length;
  const score_by_cat={};
  for(const [cat,words] of Object.entries(SIGNALS)){
    let cnt=0;
    for(const w of words) for(const t of tokens) if(t.includes(w)) cnt++;
    score_by_cat[cat]=total>0?Math.round(cnt/total*1000*100)/100:0;
  }
  const total_score=Math.round(Object.values(score_by_cat).reduce((a,b)=>a+b,0)*100)/100;
  const highlight=[];
  const sentences=text.split(/[.!?\n]/);
  for(const s of sentences){
    const st=s.trim();
    if(st.length>10&&ALL_SIGNAL_WORDS.some(w=>st.includes(w))) highlight.push(st);
  }
  return{score_by_cat,total_score,highlight:highlight.slice(0,3)};
}

function getRiskLevel(score){
  if(score>=25) return{label:'고위험',color:'#c62828',bg:'#FFEBEE',icon:'⚠'};
  if(score>=15) return{label:'주의',color:'#e65100',bg:'#FFF3E0',icon:'●'};
  return{label:'양호',color:'#2e7d32',bg:'#E8F5E9',icon:'✓'};
}

function renderResult(data, jobSim){
  const ra=document.getElementById('result-area');
  ra.style.display='block';
  const hs=data.hidden_signal;
  const risk=hs?getRiskLevel(hs.total_score):null;
  const sizeLabel=data.size_category||'미분류';
  const sizeAvgScore=sizeAvg[sizeLabel]||15;
  const escapedName=data.company_name.replace(/'/g,"\\'");
  let html='';

  // 기본 메타
  html+=`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
      <span style="font-size:19px;font-weight:600">${data.company_name}</span>
      <span style="font-size:12px;padding:2px 10px;border-radius:20px;background:#f0f0ec;color:#555;border:0.5px solid #d8d8d0">${sizeLabel}</span>
      ${data.industry?`<span style="font-size:12px;color:#999">${data.industry}</span>`:''}
    </div>
    <div class="meta-grid">
      <div class="meta-card"><div class="label">잡플래닛 평점</div><div class="value">${data.overall_rating!=null?parseFloat(data.overall_rating).toFixed(1):'N/A'} <span style="font-size:12px;color:#aaa">/ 5.0</span></div></div>
      ${hs?`<div class="meta-card"><div class="label">히든 시그널 점수</div><div class="value" style="color:${risk.color}">${hs.total_score.toFixed(1)}</div></div>`:''}
      <div class="meta-card"><div class="label">직원 수</div><div class="value">${data.employee_count?Math.round(data.employee_count)+'명':'N/A'}</div></div>
      ${jobSim?`<div class="meta-card"><div class="label">공고 신뢰도</div><div class="value">${(jobSim.similarity*100).toFixed(1)}<span style="font-size:12px;color:#aaa">%</span></div></div>`:''}
    </div>`;

  // 히든 시그널
  if(hs){
    html+=`<span class="risk-badge" style="background:${risk.bg};color:${risk.color};border:0.5px solid ${risk.color}40">${risk.icon} ${risk.label} — 히든 시그널 점수 ${hs.total_score.toFixed(1)}점</span>
    <div class="section-title">카테고리별 히든 시그널</div>`;
    for(const [cat,score] of Object.entries(hs.score_by_cat)){
      const pct=Math.min(score/MAX_SCORE*100,100);
      html+=`<div class="signal-row">
        <div class="signal-label"><span>${cat}</span><span style="color:${SIGNAL_COLORS[cat]};font-weight:500">${score.toFixed(1)}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${SIGNAL_COLORS[cat]}"></div></div>
      </div>`;
    }
    html+=`<div class="size-compare-row">
      <span style="font-size:12px;color:#888;min-width:90px">${sizeLabel} 평균 ${sizeAvgScore.toFixed(1)}</span>
      <div class="size-bar-bg"><div class="size-bar-fill" style="width:${Math.min(sizeAvgScore/MAX_SCORE*100,100)}%"></div></div>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px">${sizeLabel} 평균 대비 ${hs.total_score>sizeAvgScore?`<span style="color:#c62828">+${(hs.total_score-sizeAvgScore).toFixed(1)}점 높음</span>`:`<span style="color:#2e7d32">${(hs.total_score-sizeAvgScore).toFixed(1)}점 낮음</span>`}</div>
    <div style="margin:1.5rem 0;position:relative;height:220px"><canvas id="signalChart"></canvas></div>`;

    if(hs.highlight&&hs.highlight.length){
      html+=`<div class="section-title" style="margin-bottom:8px">리뷰 내 히든 시그널 감지 문장</div><ul class="highlight-list">`;
      for(const h of hs.highlight){
        let hi=h;
        for(const w of ALL_SIGNAL_WORDS) hi=hi.replaceAll(w,`<mark>${w}</mark>`);
        html+=`<li>${hi.slice(0,140)}${h.length>140?'…':''}</li>`;
      }
      html+=`</ul>`;
    }
  }

  // 공고 입력 섹션 (항상 표시)
  html+=`<div class="separator">
    <div class="job-input-section">
      <div class="section-title">채용 공고 신뢰도 분석</div>
      <div class="hint" style="margin-bottom:8px">선택사항 — 점핏·사람인 등의 공고 담당업무를 붙여넣으면 실제 리뷰와의 일치도를 분석합니다.</div>
      <textarea id="job-input-${escapedName}" placeholder="담당업무 텍스트를 여기에 붙여넣으세요&#10;예) AI 서비스 개발 실무 수행&#10;- 상용 LLM API 기반 기능 개발&#10;- 코드리뷰 및 테스트 작성..." style="height:100px;margin-bottom:8px"></textarea>
      <button class="primary" onclick="analyzeJobInput('${escapedName}')">공고 분석하기 →</button>
    </div>`;

  // 공고 분석 결과 (jobSim이 있을 때만)
  if(jobSim){
    const simPct=(jobSim.similarity*100).toFixed(1);
    const simColor=jobSim.similarity<0.03?'#c62828':jobSim.similarity<0.06?'#e65100':'#2e7d32';
    const simLabel=jobSim.similarity<0.03?'낮음 — 공고와 실제 업무 간 괴리 가능성':jobSim.similarity<0.06?'보통':'높음 — 공고 내용과 실무가 비교적 일치';
    html+=`<div class="sim-result">
      <div class="section-title">공고-리뷰 어휘 일치도 분석 결과</div>
      <div class="sim-header">
        <span class="sim-score" style="color:${simColor}">${simPct}%</span>
        <div style="flex:1">
          <div style="font-size:12px;color:#888;margin-bottom:4px">${simLabel}</div>
          <div class="bar-bg" style="height:10px"><div class="bar-fill" style="width:${Math.min(jobSim.similarity*500,100)}%;background:${simColor}"></div></div>
        </div>
      </div>`;
    if(jobSim.only_in_review&&jobSim.only_in_review.length){
      html+=`<div style="font-size:12px;color:#888;margin-bottom:4px;margin-top:10px">공고에는 없고 리뷰에만 등장한 신호어 — 공고가 숨긴 부정 신호일 수 있습니다</div>
      <div class="keyword-row">`;
      for(const w of jobSim.only_in_review) html+=`<span class="chip danger">⚑ ${w}</span>`;
      html+=`</div>`;
    }
    if(jobSim.only_in_job&&jobSim.only_in_job.length){
      html+=`<div style="font-size:12px;color:#888;margin-bottom:4px;margin-top:8px">공고에는 있지만 리뷰에 없는 키워드 — 과장 또는 실제 미수행 업무일 수 있습니다</div>
      <div class="keyword-row">`;
      for(const w of jobSim.only_in_job) html+=`<span class="chip warning">? ${w}</span>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 리뷰 추가 등록
  html+=`<div class="separator">
    <div class="section-title" style="margin-bottom:4px">리뷰 추가 등록</div>
    <div style="font-size:12px;color:#999;margin-bottom:8px">중복되지 않는 리뷰를 추가하면 Firebase DB에 반영되어 모든 사용자와 공유됩니다.</div>
    <textarea id="add-review-text" placeholder="추가할 리뷰 텍스트를 입력하세요" style="height:80px;margin-bottom:8px"></textarea>
    <button class="primary" id="add-btn" onclick="addReview('${escapedName}')">DB에 추가 저장</button>
    <div id="add-msg" class="msg"></div>
  </div></div>`;

  ra.innerHTML=html;

  if(hs){
    setTimeout(()=>{
      const ctx=document.getElementById('signalChart');
      if(!ctx) return;
      if(chartInst) chartInst.destroy();
      chartInst=new Chart(ctx,{
        type:'bar',
        data:{
          labels:['노동강도','조직분위기','평가이탈'],
          datasets:[{
            label:'히든 시그널 점수',
            data:[hs.score_by_cat.노동강도,hs.score_by_cat.조직분위기,hs.score_by_cat.평가이탈],
            backgroundColor:['rgba(226,75,74,0.2)','rgba(186,117,23,0.2)','rgba(24,95,165,0.2)'],
            borderColor:['#E24B4A','#BA7517','#185FA5'],
            borderWidth:1.5,borderRadius:4
          },{
            label:sizeLabel+' 평균',
            data:[sizeAvgScore/3,sizeAvgScore/3,sizeAvgScore/3],
            type:'line',
            borderColor:'#ccc',
            borderDash:[4,4],
            borderWidth:1.5,
            pointRadius:0,
            fill:false
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            y:{beginAtZero:true,max:Math.max(MAX_SCORE/2,Math.max(...Object.values(hs.score_by_cat))*1.4),ticks:{font:{size:11}}},
            x:{ticks:{font:{size:11}}}
          }
        }
      });
    },100);
  }
}
window.renderResult=renderResult;

async function addReview(name){
  const text=document.getElementById('add-review-text').value.trim();
  const msg=document.getElementById('add-msg');
  const btn=document.getElementById('add-btn');
  if(!text){msg.className='msg error';msg.textContent='리뷰 텍스트를 입력해주세요.';return;}
  if(text.length<30){msg.className='msg error';msg.textContent='텍스트가 너무 짧습니다 (30자 이상 입력해주세요).';return;}
  const existing=db[name];
  if(!existing){msg.className='msg error';msg.textContent='회사를 먼저 선택해주세요.';return;}
  const prev=existing._raw_review||'';
  if(prev.includes(text.slice(0,30))){msg.className='msg error';msg.textContent='이미 등록된 리뷰와 중복됩니다.';return;}
  btn.disabled=true; btn.textContent='저장 중...';
  const merged=prev+' '+text;
  existing.hidden_signal=calcHiddenSignal(merged);
  existing._raw_review=merged;
  await saveToFirebase(name,existing);
  btn.disabled=false; btn.textContent='DB에 추가 저장';
  msg.className='msg success';msg.textContent='Firebase DB에 저장되었습니다.';
  setTimeout(()=>{renderResult(db[name],null);},500);
}
window.addReview=addReview;

loadFromFirebase();
</script>
